<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title data-i18n="pageTitle">实时心率监控（WebSocket 版）</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }
    :root {
      --heart-scale: 4;
      --bpm-scale: 1.8;
      --unit-scale: 0.4;
      --base-font-size: clamp(12px, 6vw, 45px);
      --gap-heart-bpm: 0.4em;
      --gap-bpm-unit: 0.3em;
    }
    body {
      background: #0b1120;
      color: #fff;
      width: 100vw;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      place-content: safe center;
      justify-content: safe center;
      align-items: center;
      text-align: center;
      padding: 8px;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .box {
      width: 100%;
      min-height: min-content;
      display: flex;
      flex-direction: column;
      place-content: safe center;
      justify-content: safe center;
      align-items: center;
      text-align: center;
      flex-shrink: 0;
    }
    .title, .input-line, .floatBtn, .status, .device {
      display: none;
    }
    .heart-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      flex-shrink: 0;
      width: 100%;
      text-align: center;
      font-size: var(--base-font-size);
      margin: auto 0;
    }
    .gap-click {
      width: 100%;
      flex-shrink: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      min-height: 2px;
    }
    .gap-heart-bpm {
      height: var(--gap-heart-bpm);
    }
    .gap-bpm-unit {
      height: var(--gap-bpm-unit);
    }
    .heart {
      width: calc(var(--heart-scale) * 1em);
      height: auto;
      aspect-ratio: 1/1;
      fill: #ef4444;
      transform-origin: center center;
      will-change: transform;
      flex-shrink: 0;
      margin: 0 auto;
      shape-rendering: geometricPrecision;
      transform: scale(1) translateX(0px);
      transition: transform 0.22s cubic-bezier(0.14, 0.78, 0.34, 1), width 0.1s ease;
      padding: 0.5em;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    .heart.long-pressing {
      filter: drop-shadow(0 0 14px rgba(248, 113, 113, 0.95));
    }
    .bpm {
      font-size: calc(var(--bpm-scale) * 1em);
      font-weight: 700;
      color: #f87171;
      line-height: 1;
      flex-shrink: 0;
      margin: 0 auto;
      width: 100%;
      text-align: center;
      cursor: pointer;
      padding: 0.2em 0;
      transition: font-size 0.1s ease;
    }
    .unit {
      font-size: calc(var(--unit-scale) * 1em);
      color: #94a3b8;
      flex-shrink: 0;
      margin: 0 auto;
      width: 100%;
      text-align: center;
      cursor: pointer;
      padding: 0.2em 0;
      transition: font-size 0.1s ease;
    }
    .mask {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.7);
      z-index: 9998;
      display: none;
    }
    .mask.show {
      display: block;
    }
    .scale-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1e293b;
      padding: 1.5em;
      border-radius: 12px;
      z-index: 9999;
      width: 90%;
      max-width: 350px;
      display: none;
      flex-direction: column;
      gap: 1.2em;
      border: 1px solid #334155;
    }
    .scale-panel.show {
      display: flex;
    }
    .panel-title {
      font-size: 1.2em;
      font-weight: 600;
      color: #f87171;
      text-align: center;
      margin-bottom: 0.2em;
    }
    .scale-item {
      display: flex;
      flex-direction: column;
      gap: 0.6em;
      width: 100%;
    }
    .scale-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9em;
      color: #cbd5e1;
    }
    .scale-input-wrap {
      display: flex;
      gap: 0.8em;
      align-items: center;
      width: 100%;
    }
    .scale-slider {
      flex: 1;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #334155;
      outline: none;
      -webkit-appearance: none;
    }
    .scale-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ef4444;
      cursor: pointer;
    }
    .scale-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ef4444;
      cursor: pointer;
      border: none;
    }
    .scale-input {
      width: 60px;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 6px;
      color: #fff;
      text-align: center;
      padding: 0.4em 0;
      font-size: 0.9em;
    }
    .btn-group {
      display: flex;
      gap: 1em;
      margin-top: 0.5em;
    }
    .btn {
      flex: 1;
      padding: 0.6em 0;
      border-radius: 8px;
      border: none;
      font-size: 0.9em;
      cursor: pointer;
      font-weight: 500;
    }
    .btn-confirm {
      background: #ef4444;
      color: #fff;
    }
    .btn-reset {
      background: #334155;
      color: #cbd5e1;
    }
    .lang-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 41, 59, 0.95);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 0.85em;
      color: #cbd5e1;
      z-index: 10000;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      border: 1px solid #334155;
    }
    .lang-hint.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="title" data-i18n="title">实时心率监控（WebSocket）</div>
    <div class="input-line">
      <input id="wsUrl" data-i18n-placeholder="wsPlaceholder" placeholder="输入 WebSocket 地址" value="ws://192.168.31.26:8001">
      <button id="connectBtn">连接</button>
    </div>
    <div class="status" id="status">未连接</div>
    <div class="device" id="device"></div>
    <div class="heart-area">
      <svg class="heart" id="heartIcon" viewBox="0 0 24 24">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
      <div class="gap-click gap-heart-bpm" id="gapHeartBpm"></div>
      <div class="bpm" id="bpm">--</div>
      <div class="gap-click gap-bpm-unit" id="gapBpmUnit"></div>
      <div class="unit" data-i18n="unit">次/分钟</div>
    </div>
  </div>

  <div class="mask" id="mask"></div>

  <div class="scale-panel" id="heartPanel">
    <div class="panel-title" data-i18n="heartPanelTitle">调节图标大小</div>
    <div class="scale-item">
      <div class="scale-label">
        <span data-i18n="iconScaleLabel">心形图标比例</span>
        <span id="heartValue">4.0</span>
      </div>
      <div class="scale-input-wrap">
        <input type="range" min="0.5" max="6" step="0.1" value="4" class="scale-slider" id="heartSlider">
        <input type="number" min="0.5" max="6" step="0.1" value="4" class="scale-input" id="heartInput">
      </div>
      <div class="scale-label" style="font-size: 0.8em; color: #94a3b8;" data-i18n="iconScaleHint">
        数值越大，图标相对于数字越大
      </div>
    </div>
    <div class="btn-group">
      <button class="btn btn-reset" id="heartReset" data-i18n="resetBtn">恢复默认</button>
      <button class="btn btn-confirm" id="heartConfirm" data-i18n="saveBtn">保存</button>
    </div>
  </div>

  <div class="scale-panel" id="unitPanel">
    <div class="panel-title" data-i18n="unitPanelTitle">调节单位文字大小</div>
    <div class="scale-item">
      <div class="scale-label">
        <span data-i18n="unitScaleLabel">单位标签比例</span>
        <span id="unitValue">0.4</span>
      </div>
      <div class="scale-input-wrap">
        <input type="range" min="0.1" max="2" step="0.05" value="0.4" class="scale-slider" id="unitSlider">
        <input type="number" min="0.1" max="2" step="0.05" value="0.4" class="scale-input" id="unitInput">
      </div>
      <div class="scale-label" style="font-size: 0.8em; color: #94a3b8;" data-i18n="unitScaleHint">
        数值越大，单位文字相对于数字越大
      </div>
    </div>
    <div class="btn-group">
      <button class="btn btn-reset" id="unitReset" data-i18n="resetBtn">恢复默认</button>
      <button class="btn btn-confirm" id="unitConfirm" data-i18n="saveBtn">保存</button>
    </div>
  </div>

  <div class="scale-panel" id="gapHeartBpmPanel">
    <div class="panel-title" data-i18n="gapHeartBpmPanelTitle">调节图标与数字间距</div>
    <div class="scale-item">
      <div class="scale-label">
        <span data-i18n="gapLabel">间距大小</span>
        <span id="gapHeartBpmValue">0.4em</span>
      </div>
      <div class="scale-input-wrap">
        <input type="range" min="0" max="2" step="0.05" value="0.4" class="scale-slider" id="gapHeartBpmSlider">
        <input type="number" min="0" max="2" step="0.05" value="0.4" class="scale-input" id="gapHeartBpmInput">
      </div>
      <div class="scale-label" style="font-size: 0.8em; color: #94a3b8;" data-i18n="gapHeartBpmHint">
        数值越大，图标与数字之间的空隙越大，0为无空隙
      </div>
    </div>
    <div class="btn-group">
      <button class="btn btn-reset" id="gapHeartBpmReset" data-i18n="resetBtn">恢复默认</button>
      <button class="btn btn-confirm" id="gapHeartBpmConfirm" data-i18n="saveBtn">保存</button>
    </div>
  </div>

  <div class="scale-panel" id="gapBpmUnitPanel">
    <div class="panel-title" data-i18n="gapBpmUnitPanelTitle">调节数字与单位间距</div>
    <div class="scale-item">
      <div class="scale-label">
        <span data-i18n="gapLabel">间距大小</span>
        <span id="gapBpmUnitValue">0.3em</span>
      </div>
      <div class="scale-input-wrap">
        <input type="range" min="0" max="2" step="0.05" value="0.3" class="scale-slider" id="gapBpmUnitSlider">
        <input type="number" min="0" max="2" step="0.05" value="0.3" class="scale-input" id="gapBpmUnitInput">
      </div>
      <div class="scale-label" style="font-size: 0.8em; color: #94a3b8;" data-i18n="gapBpmUnitHint">
        数值越大，数字与单位之间的空隙越大，0为无空隙
      </div>
    </div>
    <div class="btn-group">
      <button class="btn btn-reset" id="gapBpmUnitReset" data-i18n="resetBtn">恢复默认</button>
      <button class="btn btn-confirm" id="gapBpmUnitConfirm" data-i18n="saveBtn">保存</button>
    </div>
  </div>

  <div class="lang-hint" id="langHint"></div>

  <script>
    const I18N = {

      },
      'en': {
        pageTitle: 'Real-time Heart Rate Monitor (WebSocket)',
        title: 'Real-time Heart Rate Monitor (WebSocket)',
        wsPlaceholder: 'Enter WebSocket address',
        connectBtn: 'Connect',
        statusDisconnected: 'Disconnected',
        statusConnecting: 'Connecting...',
        statusConnected: 'Connected',
        statusTimeout: 'Connection timed out',

        unit: 'BPM',
        heartPanelTitle: 'Adjust Icon Size',

        iconScaleHint: 'Higher value = larger icon relative to number',

        gapBpmUnitHint: 'Higher value = larger gap between number and unit, 0 = no gap',
        resetBtn: 'Reset to default',
        saveBtn: 'Save',
        alertWsRequired: 'Please enter a complete WebSocket address (format: ws://IP:port)',
        alertAddressSaved: 'Address saved, reconnecting!',
        alertIconSaved: 'Icon scale saved!',
        alertUnitSaved: 'Unit label scale saved!',
        alertGapHeartBpmSaved: 'Icon-number gap saved!',
        alertGapBpmUnitSaved: 'Number-unit gap saved!',
        langSwitchToEn: 'Language switched to English',
        langSwitchToZh: 'Language switched to 中文',
        promptWsTitle: 'Please enter WebSocket address (format: ws://IP:port)',
        loopRestart: 'ℹ️  Loop interrupted, restarting heart rate loop',
        loopCleared: '🗑️  Old heart rate loop cleared',
        heartRateUpdated: '❤️  Heart rate updated:',
        beatCycle: '🔄  Starting heart rate loop, cycle:',
        ms: 'ms',
        connSuccess: '✅ WebSocket connected! Current address:',
        connTimeout: '❌ Connection timed out',
        wsData: '📥 Received WebSocket data, raw heart rate value:',
        processed: 'processed:',
        invalidValue: '⚠️  Received invalid heart rate value, skipping',
        parseError: '❌ Data parsing failed, error details:',
        rawData: '📥 Received raw data:',
        connError: '❌ WebSocket connection error, details:',
        connClosed: '🔌 WebSocket disconnected, close code:',
        reason: 'reason:',
        autoReconnect: '⏳  Auto-reconnecting in 3 seconds...',
        doubleClickNumber: '🎯 Double-clicked number, triggering address settings',
        doubleClickIcon: '🎯 Double-clicked icon, triggering icon scale adjustment',
        doubleClickUnit: '🎯 Double-clicked unit label, triggering unit scale adjustment',
        doubleClickGapHeartBpm: '🎯 Double-clicked icon-number gap, triggering gap adjustment',
        doubleClickGapBpmUnit: '🎯 Double-clicked number-unit gap, triggering gap adjustment',
        pageVisible: 'ℹ️  Page became visible again, restarting heart rate loop'
      }
    };

    const LANG_STORAGE_KEY = 'newMarsHeartBeatLang';
    const LEGACY_LANG_STORAGE_KEY = 'nmbLang';
    let currentLang = 'zh';

    function t(key) {
      return I18N[currentLang][key] || I18N.en[key] || key;
    }

    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem(LANG_STORAGE_KEY, lang);
      localStorage.removeItem(LEGACY_LANG_STORAGE_KEY);
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      document.title = t('pageTitle');

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (I18N[lang][key]) {
          el.textContent = I18N[lang][key];
        }
      });

      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (I18N[lang][key]) {
          el.placeholder = I18N[lang][key];
        }
      });

      renderDynamicConnectionText();
    }

    function detectInitialLang() {
      const saved = localStorage.getItem(LANG_STORAGE_KEY) || localStorage.getItem(LEGACY_LANG_STORAGE_KEY);
      if (saved === 'zh' || saved === 'en') return saved;

      const langs = navigator.languages || [navigator.language || ''];
      return langs.some(lang => lang.toLowerCase().startsWith('zh')) ? 'zh' : 'en';
    }

    function clampNumber(value, min, max, fallback) {
      const n = Number.parseFloat(value);
      if (!Number.isFinite(n)) return fallback;
      return Math.min(max, Math.max(min, n));
    }

    const wsUrl = document.getElementById('wsUrl');
    const connectBtn = document.getElementById('connectBtn');
    const bpmEl = document.getElementById('bpm');
    const statusEl = document.getElementById('status');
    const deviceEl = document.getElementById('device');
    const heartIcon = document.getElementById('heartIcon');
    const unitEl = document.querySelector('.unit');
    const mask = document.getElementById('mask');
    const root = document.documentElement;
    const langHint = document.getElementById('langHint');
    let ws = null;
    let currentHeartRate = 0;
    let beatInterval = null;
    let isBeating = false;
    let reconnectTimer = null;
    let connectTimeout = null;
    let statusKey = 'statusDisconnected';
    let connectBtnKey = 'connectBtn';

    function renderDynamicConnectionText() {
      if (statusEl) statusEl.textContent = t(statusKey);
      if (connectBtn) connectBtn.textContent = t(connectBtnKey);
    }

    function setStatus(key) {
      statusKey = key;
      if (statusEl) statusEl.textContent = t(key);
    }

    function setConnectButton(key) {
      connectBtnKey = key;
      if (connectBtn) connectBtn.textContent = t(key);
    }

    function bindLongPress(el, onLongPress, { duration = 5000, moveTolerance = 40 } = {}) {
      let timer = null;
      let pointerId = null;
      let startX = 0;
      let startY = 0;
      let longPressFired = false;

      function clearTimer() {
        if (timer) clearTimeout(timer);
        timer = null;
        pointerId = null;
        el.classList.remove('long-pressing');
      }

      el.addEventListener('pointerdown', (event) => {
        if (event.pointerType === 'mouse' && event.button !== 0) return;

        clearTimer();
        longPressFired = false;
        pointerId = event.pointerId;
        startX = event.clientX;
        startY = event.clientY;
        el.classList.add('long-pressing');

        try {
          el.setPointerCapture?.(event.pointerId);
        } catch (err) {
          console.warn('Pointer capture failed, long press will still continue:', err);
        }

        timer = setTimeout(() => {
          longPressFired = true;
          clearTimer();
          onLongPress(event);
        }, duration);
      });

      el.addEventListener('pointermove', (event) => {
        if (event.pointerId !== pointerId || !timer) return;

        const moved = Math.hypot(event.clientX - startX, event.clientY - startY);
        if (moved > moveTolerance) clearTimer();
      });

      // Do not cancel on pointerleave/lostpointercapture.
      // Some browsers fire those during SVG animation or pointer capture, which can cancel a valid 5s hold.
      ['pointerup', 'pointercancel'].forEach((type) => {
        el.addEventListener(type, clearTimer);
      });

      el.addEventListener('contextmenu', (event) => {
        event.preventDefault();
      });

      el.addEventListener('click', (event) => {
        if (!longPressFired) return;
        event.preventDefault();
        event.stopImmediatePropagation();
        longPressFired = false;
      }, true);

      document.addEventListener('visibilitychange', () => {
        if (document.hidden) clearTimer();
      });
    }

    bindLongPress(heartIcon, () => {
      const newLang = currentLang === 'zh' ? 'en' : 'zh';
      setLanguage(newLang);
      const message = newLang === 'zh' ? t('langSwitchToZh') : t('langSwitchToEn');
      langHint.textContent = message;
      langHint.classList.add('show');
      setTimeout(() => {
        langHint.classList.remove('show');
      }, 2000);
      console.log('🌐 Language switched to:', newLang);
    });

    function runSingleBeat() {
      if (currentHeartRate <= 0 || isBeating) return;
      isBeating = true;
      const totalDuration = 60 / currentHeartRate * 1000;
      const scaleUpTime = totalDuration * 0.35;
      const scaleDownTime = totalDuration * 0.65;
      heartIcon.style.transform = 'scale(1.25) translateX(0px)';
      setTimeout(() => {
        heartIcon.style.transform = 'scale(1) translateX(0px)';
        setTimeout(() => {
          isBeating = false;
        }, scaleDownTime);
      }, scaleUpTime);
    }

    function startBeatLoop(newRate) {
      if (newRate === currentHeartRate && !beatInterval) {
        console.log(t('loopRestart'));
      }
      else if (newRate !== currentHeartRate && beatInterval) {
        clearInterval(beatInterval);
        beatInterval = null;
        console.log(t('loopCleared'));
      }
      else if (newRate === currentHeartRate && beatInterval) {
        return;
      }
      currentHeartRate = newRate;
      console.log(t('heartRateUpdated'), currentHeartRate);
      if (currentHeartRate > 0) {
        const beatCycle = 60 / currentHeartRate * 1000;
        console.log(t('beatCycle'), beatCycle.toFixed(0), t('ms'));
        beatInterval = setInterval(runSingleBeat, beatCycle);
        runSingleBeat();
      }
    }

    function connect() {
      const url = wsUrl.value.trim();
      if (!url) {
        alert(t('alertWsRequired'));
        return;
      }
      localStorage.setItem('wsUrl', url);
      if (ws) {
        try {
          ws.close(1000, 'Manual reconnect');
        } catch (err) {
          console.warn('Failed to close previous WebSocket:', err);
        }
      }
      if (connectTimeout) clearTimeout(connectTimeout);
      if (beatInterval) {
        clearInterval(beatInterval);
        beatInterval = null;
      }
      setStatus('statusConnecting');
      setConnectButton('statusConnecting');

      ws = new WebSocket(url);
      const socket = ws;
      connectTimeout = setTimeout(() => {
        if (socket !== ws) return;
        if (socket.readyState !== WebSocket.OPEN) {
          console.error(t('connTimeout'));
          setStatus('statusTimeout');
          setConnectButton('reconnect');
          socket.close();
        }
      }, 5000);

      ws.onopen = () => {
        if (socket !== ws) return;
        console.log(t('connSuccess'), url);
        clearTimeout(connectTimeout);
        setStatus('statusConnected');
        setConnectButton('statusConnected');
        clearTimeout(reconnectTimer);
      };

      ws.onmessage = (event) => {
        if (socket !== ws) return;
        try {
          const data = JSON.parse(event.data);
          const newRate = Math.round(Number(data.heart_rate) || 0);
          console.log(t('wsData'), data.heart_rate, t('processed'), newRate);
          if (newRate > 0) {
            bpmEl.textContent = newRate;
            deviceEl.textContent = data.status || t('statusConnected');
            startBeatLoop(newRate);
          } else {
            console.log(t('invalidValue'));
          }
        } catch (err) {
          console.error(t('parseError'), err);
          console.log(t('rawData'), event.data);
        }
      };

      ws.onerror = (err) => {
        if (socket !== ws) return;
        console.error(t('connError'), err);
        clearTimeout(connectTimeout);
        setStatus('statusError');
        setConnectButton('reconnect');
      };

      ws.onclose = (e) => {
        if (socket !== ws) return;
        console.log(t('connClosed'), e.code, t('reason'), e.reason);
        clearTimeout(connectTimeout);
        if (beatInterval) {
          clearInterval(beatInterval);
          beatInterval = null;
        }
        setStatus('statusDisconnected');
        setConnectButton('reconnect');
        if (e.code !== 1000) {
          console.log(t('autoReconnect'));
          clearTimeout(reconnectTimer);
          reconnectTimer = setTimeout(connect, 3000);
        }
      };
    }

    function bindDoubleClick(element, callback) {
      let lastClickTime = 0;
      const doubleClickDelay = 300;
      element.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const currentTime = new Date().getTime();
        const clickDiff = currentTime - lastClickTime;
        if (clickDiff < doubleClickDelay && clickDiff > 0) {
          callback();
        }
        lastClickTime = currentTime;
      });
    }

    bindDoubleClick(bpmEl, () => {
      console.log(t('doubleClickNumber'));
      const newUrl = prompt(
        t('promptWsTitle'),
        wsUrl.value.trim()
      );
      if (newUrl !== null && newUrl.trim() !== '') {
        wsUrl.value = newUrl.trim();
        connect();
        alert(t('alertAddressSaved'));
      }
    });

    const heartPanel = document.getElementById('heartPanel');
    const heartSlider = document.getElementById('heartSlider');
    const heartInput = document.getElementById('heartInput');
    const heartValue = document.getElementById('heartValue');
    const heartConfirm = document.getElementById('heartConfirm');
    const heartReset = document.getElementById('heartReset');

    bindDoubleClick(heartIcon, () => {
      console.log(t('doubleClickIcon'));
      heartPanel.classList.add('show');
      mask.classList.add('show');
    });

    heartSlider.addEventListener('input', () => {
      const scale = clampNumber(heartSlider.value, 0.5, 6, 4);
      root.style.setProperty('--heart-scale', scale);
      heartInput.value = scale;
      heartValue.textContent = scale.toFixed(1);
    });
    heartInput.addEventListener('input', () => {
      const scale = clampNumber(heartInput.value, 0.5, 6, 4);
      heartInput.value = scale;
      root.style.setProperty('--heart-scale', scale);
      heartSlider.value = scale;
      heartValue.textContent = scale.toFixed(1);
    });

    heartConfirm.addEventListener('click', () => {
      const scale = clampNumber(heartSlider.value, 0.5, 6, 4);
      localStorage.setItem('heartScale', scale);
      heartPanel.classList.remove('show');
      mask.classList.remove('show');
      alert(t('alertIconSaved'));
    });

    heartReset.addEventListener('click', () => {
      const defaultScale = 4;
      root.style.setProperty('--heart-scale', defaultScale);
      heartSlider.value = defaultScale;
      heartInput.value = defaultScale;
      heartValue.textContent = defaultScale.toFixed(1);
    });

    const unitPanel = document.getElementById('unitPanel');
    const unitSlider = document.getElementById('unitSlider');
    const unitInput = document.getElementById('unitInput');
    const unitValue = document.getElementById('unitValue');
    const unitConfirm = document.getElementById('unitConfirm');
    const unitReset = document.getElementById('unitReset');

    bindDoubleClick(unitEl, () => {
      console.log(t('doubleClickUnit'));
      unitPanel.classList.add('show');
      mask.classList.add('show');
    });

    unitSlider.addEventListener('input', () => {
      const scale = clampNumber(unitSlider.value, 0.1, 2, 0.4);
      root.style.setProperty('--unit-scale', scale);
      unitInput.value = scale;
      unitValue.textContent = scale.toFixed(2);
    });
    unitInput.addEventListener('input', () => {
      const scale = clampNumber(unitInput.value, 0.1, 2, 0.4);
      unitInput.value = scale;
      root.style.setProperty('--unit-scale', scale);
      unitSlider.value = scale;
      unitValue.textContent = scale.toFixed(2);
    });

    unitConfirm.addEventListener('click', () => {
      const scale = clampNumber(unitSlider.value, 0.1, 2, 0.4);
      localStorage.setItem('unitScale', scale);
      unitPanel.classList.remove('show');
      mask.classList.remove('show');
      alert(t('alertUnitSaved'));
    });

    unitReset.addEventListener('click', () => {
      const defaultScale = 0.4;
      root.style.setProperty('--unit-scale', defaultScale);
      unitSlider.value = defaultScale;
      unitInput.value = defaultScale;
      unitValue.textContent = defaultScale.toFixed(2);
    });

    const gapHeartBpmEl = document.getElementById('gapHeartBpm');
    const gapHeartBpmPanel = document.getElementById('gapHeartBpmPanel');
    const gapHeartBpmSlider = document.getElementById('gapHeartBpmSlider');
    const gapHeartBpmInput = document.getElementById('gapHeartBpmInput');
    const gapHeartBpmValue = document.getElementById('gapHeartBpmValue');
    const gapHeartBpmConfirm = document.getElementById('gapHeartBpmConfirm');
    const gapHeartBpmReset = document.getElementById('gapHeartBpmReset');

    bindDoubleClick(gapHeartBpmEl, () => {
      console.log(t('doubleClickGapHeartBpm'));
      gapHeartBpmPanel.classList.add('show');
      mask.classList.add('show');
    });

    gapHeartBpmSlider.addEventListener('input', () => {
      const gap = clampNumber(gapHeartBpmSlider.value, 0, 2, 0.4);
      root.style.setProperty('--gap-heart-bpm', `${gap}em`);
      gapHeartBpmInput.value = gap;
      gapHeartBpmValue.textContent = `${gap.toFixed(2)}em`;
    });
    gapHeartBpmInput.addEventListener('input', () => {
      const gap = clampNumber(gapHeartBpmInput.value, 0, 2, 0.4);
      gapHeartBpmInput.value = gap;
      root.style.setProperty('--gap-heart-bpm', `${gap}em`);
      gapHeartBpmSlider.value = gap;
      gapHeartBpmValue.textContent = `${gap.toFixed(2)}em`;
    });

    gapHeartBpmConfirm.addEventListener('click', () => {
      const gap = clampNumber(gapHeartBpmSlider.value, 0, 2, 0.4);
      localStorage.setItem('gapHeartBpm', gap);
      gapHeartBpmPanel.classList.remove('show');
      mask.classList.remove('show');
      alert(t('alertGapHeartBpmSaved'));
    });

    gapHeartBpmReset.addEventListener('click', () => {
      const defaultGap = 0.4;
      root.style.setProperty('--gap-heart-bpm', `${defaultGap}em`);
      gapHeartBpmSlider.value = defaultGap;
      gapHeartBpmInput.value = defaultGap;
      gapHeartBpmValue.textContent = `${defaultGap.toFixed(2)}em`;
    });

    const gapBpmUnitEl = document.getElementById('gapBpmUnit');
    const gapBpmUnitPanel = document.getElementById('gapBpmUnitPanel');
    const gapBpmUnitSlider = document.getElementById('gapBpmUnitSlider');
    const gapBpmUnitInput = document.getElementById('gapBpmUnitInput');
    const gapBpmUnitValue = document.getElementById('gapBpmUnitValue');
    const gapBpmUnitConfirm = document.getElementById('gapBpmUnitConfirm');
    const gapBpmUnitReset = document.getElementById('gapBpmUnitReset');

    bindDoubleClick(gapBpmUnitEl, () => {
      console.log(t('doubleClickGapBpmUnit'));
      gapBpmUnitPanel.classList.add('show');
      mask.classList.add('show');
    });

    gapBpmUnitSlider.addEventListener('input', () => {
      const gap = clampNumber(gapBpmUnitSlider.value, 0, 2, 0.3);
      root.style.setProperty('--gap-bpm-unit', `${gap}em`);
      gapBpmUnitInput.value = gap;
      gapBpmUnitValue.textContent = `${gap.toFixed(2)}em`;
    });
    gapBpmUnitInput.addEventListener('input', () => {
      const gap = clampNumber(gapBpmUnitInput.value, 0, 2, 0.3);
      gapBpmUnitInput.value = gap;
      root.style.setProperty('--gap-bpm-unit', `${gap}em`);
      gapBpmUnitSlider.value = gap;
      gapBpmUnitValue.textContent = `${gap.toFixed(2)}em`;
    });

    gapBpmUnitConfirm.addEventListener('click', () => {
      const gap = clampNumber(gapBpmUnitSlider.value, 0, 2, 0.3);
      localStorage.setItem('gapBpmUnit', gap);
      gapBpmUnitPanel.classList.remove('show');
      mask.classList.remove('show');
      alert(t('alertGapBpmUnitSaved'));
    });

    gapBpmUnitReset.addEventListener('click', () => {
      const defaultGap = 0.3;
      root.style.setProperty('--gap-bpm-unit', `${defaultGap}em`);
      gapBpmUnitSlider.value = defaultGap;
      gapBpmUnitInput.value = defaultGap;
      gapBpmUnitValue.textContent = `${defaultGap.toFixed(2)}em`;
    });

    mask.addEventListener('click', () => {
      document.querySelectorAll('.scale-panel').forEach(panel => {
        panel.classList.remove('show');
      });
      mask.classList.remove('show');
    });

    function initAllSettings() {
      if (localStorage.getItem('wsUrl')) {
        wsUrl.value = localStorage.getItem('wsUrl');
      }
      const savedHeartScale = localStorage.getItem('heartScale');
      if (savedHeartScale) {
        const scale = clampNumber(savedHeartScale, 0.5, 6, 4);
        root.style.setProperty('--heart-scale', scale);
        heartSlider.value = scale;
        heartInput.value = scale;
        heartValue.textContent = scale.toFixed(1);
      }
      const savedUnitScale = localStorage.getItem('unitScale');
      if (savedUnitScale) {
        const scale = clampNumber(savedUnitScale, 0.1, 2, 0.4);
        root.style.setProperty('--unit-scale', scale);
        unitSlider.value = scale;
        unitInput.value = scale;
        unitValue.textContent = scale.toFixed(2);
      }
      const savedGapHeartBpm = localStorage.getItem('gapHeartBpm');
      if (savedGapHeartBpm) {
        const gap = clampNumber(savedGapHeartBpm, 0, 2, 0.4);
        root.style.setProperty('--gap-heart-bpm', `${gap}em`);
        gapHeartBpmSlider.value = gap;
        gapHeartBpmInput.value = gap;
        gapHeartBpmValue.textContent = `${gap.toFixed(2)}em`;
      }
      const savedGapBpmUnit = localStorage.getItem('gapBpmUnit');
      if (savedGapBpmUnit) {
        const gap = clampNumber(savedGapBpmUnit, 0, 2, 0.3);
        root.style.setProperty('--gap-bpm-unit', `${gap}em`);
        gapBpmUnitSlider.value = gap;
        gapBpmUnitInput.value = gap;
        gapBpmUnitValue.textContent = `${gap.toFixed(2)}em`;
      }
    }

    connectBtn.addEventListener('click', connect);
    window.addEventListener('load', () => {
      const initialLang = detectInitialLang();
      setLanguage(initialLang);
      initAllSettings();
      connect();
    });
    window.addEventListener('beforeunload', () => {
      if (beatInterval) clearInterval(beatInterval);
      if (connectTimeout) clearTimeout(connectTimeout);
      if (reconnectTimer) clearTimeout(reconnectTimer);
      if (ws) ws.close(1000, 'Page unload');
    });
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && currentHeartRate > 0 && !beatInterval) {
        console.log(t('pageVisible'));
        startBeatLoop(currentHeartRate);
      }
    });
  </script>
</body>
</html>
